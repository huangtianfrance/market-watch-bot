market_indicators:
  - name: VIX
    ticker: ^VIX
    rules:
      extreme_fear_above: 30
      extreme_greed_below: 12
    notes: "Extreme fear may fit panic-buy watch. Extreme greed may fit strength-selling discipline."

  - name: US 10Y Yield
    ticker: ^TNX
    notes: "Yahoo quotes TNX as yield x10. 45 means 4.5%. Higher yields pressure high-duration tech."

  - name: Nasdaq 100 ETF
    ticker: QQQ
    notes: "AI / mega-cap tech risk appetite proxy."
