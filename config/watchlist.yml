portfolio:
  base_currency: EUR
  alert_timezone: Europe/Paris
  send_email_when_no_alerts: false
  report_mode: alerts_only
  language: zh_en

global_rules:
  stock_big_up_daily_pct: 5.0
  stock_big_up_5d_pct: 10.0
  historic_low_lookback_years:
    - 1
    - 3
    - 5
  historic_low_tolerance_pct: 2.0
  confirmed_rerating_daily_pct: 8.0
  confirmed_rerating_5d_pct: 15.0
  confirmed_rerating_volume_ratio_min: 2.0
  rotation_sell_daily_pct: 4.0
  rotation_sell_5d_pct: 8.0
  rotation_buy_5d_drop_pct: -8.0
  rotation_buy_near_low_years: 1
  rotation_buy_near_low_tolerance_pct: 5.0

rotation_engine:
  enabled: true
  max_pairs_per_email: 5
  action_template: "Review trimming a small tranche from the strength candidate and moving it into the opportunity candidate."

stocks:
  - name: Bitcoin
    ticker: BTC-USD
    position: 0
    cost_basis: 0
    currency: USD
    asset_type: crypto
    notes: "Potential future allocation. Watch extreme fear, ETF adoption, miner economics, and macro liquidity."
    rotation:
      role: aggressive
      allow_as_target_when_not_held: true
      sell_strength:
        min_daily_pct: 8.0
        min_5d_pct: 18.0
      buy_opportunity:
        near_low_years: 1
        near_low_tolerance_pct: 8.0
        max_5d_pct: -12.0
      fundamental_guardrail:
        red_flags:
          - "Spot Bitcoin ETFs return to persistent multi-week outflows"
          - "Regulatory actions materially impair U.S./EU institutional access"
          - "Network security concerns appear through a sustained hashrate collapse"
          - "Liquidity tightens sharply due to hawkish Fed, rising real yields, or credit stress"
          - "Stablecoin or major exchange stress creates systemic crypto liquidity risk"

  - name: Airbus
    ticker: AIR.PA
    position: 18
    cost_basis: 191.54
    currency: EUR
    notes: "Core holding. Consider trimming 2-3 shares on strength near 205-210."
    rotation:
      role: core
      sell_strength:
        min_price: 205
        min_daily_pct: 2.0
        min_5d_pct: 5.0
      buy_opportunity:
        near_low_years: 1
        near_low_tolerance_pct: 6.0
        max_5d_pct: -7.0
      fundamental_guardrail:
        red_flags:
          - "Airbus cuts annual delivery guidance materially below 870 aircraft"
          - "Engine supply or production ramp problems worsen materially"
          - "Free cash flow guidance is cut materially"
          - "Major quality/safety issue causes delivery halt or regulatory action"
          - "Large order cancellations or airline demand deterioration appear"
    levels:
      watch_support: 190
      trim_zone: 205
      strong_resistance: 216
      risk_level: 180

  - name: Oracle
    ticker: ORCL
    position: 14
    cost_basis: 132.07
    currency: EUR
    notes: "High-risk AI infrastructure rebound holding. Watch debt, FCF, capex, Fed path."
    rotation:
      role: aggressive
      loss_protection:
        avoid_as_funding_source_below_recovery: true
        recovery_price: 155
        note: "Do not rotate out of Oracle at a deep loss unless the thesis is manually judged broken."
      sell_strength:
        min_price: 155
        min_daily_pct: 5.0
        min_5d_pct: 12.0
      buy_opportunity:
        max_price: 125
        near_low_years: 1
        near_low_tolerance_pct: 5.0
        max_5d_pct: -8.0
      fundamental_guardrail:
        red_flags:
          - "Oracle credit rating cut below investment grade"
          - "Oracle guides RPO or OCI growth materially below prior guidance"
          - "Oracle announces AI capex or financing materially worse than current plan"
          - "Major OpenAI/Stargate/OCI customer contract is cancelled or repriced downward"
          - "Free cash flow outlook worsens without credible financing or customer prepayment support"
    levels:
      panic_watch_usd: 120
      add_confirmation_usd: 135
      recovery_confirmation_usd: 145
      trim_zone_usd: 155

  - name: Microsoft
    ticker: MSFT
    position: 2
    cost_basis: 320.50
    currency: EUR
    notes: "Quality mega-cap tech. More defensive than Oracle/PDD/Meituan."
    rotation:
      role: core
      sell_strength:
        min_daily_pct: 3.5
        min_5d_pct: 7.0
      buy_opportunity:
        near_low_years: 1
        near_low_tolerance_pct: 5.0
        max_5d_pct: -7.0
      fundamental_guardrail:
        red_flags:
          - "Azure growth or AI monetization materially misses guidance"
          - "Management cuts cloud or operating margin guidance"
          - "Major regulatory or antitrust action changes business outlook"
          - "OpenAI partnership economics materially worsen"

  - name: PDD
    ticker: PDD
    position: 10
    cost_basis: 101.60
    currency: EUR
    notes: "High-volatility China e-commerce exposure."
    rotation:
      role: aggressive
      loss_protection:
        avoid_as_funding_source_below_recovery: true
        recovery_price: 115
        note: "Do not use PDD as a funding source while it is materially below recovery price unless the thesis is broken."
      sell_strength:
        min_daily_pct: 6.0
        min_5d_pct: 14.0
      buy_opportunity:
        near_low_years: 1
        near_low_tolerance_pct: 6.0
        max_5d_pct: -10.0
      fundamental_guardrail:
        red_flags:
          - "Temu or PDD revenue growth decelerates materially"
          - "Margins collapse due to subsidies, tariffs, logistics or regulation"
          - "U.S./EU regulatory pressure on Temu materially worsens"
          - "China consumer data or platform competition weakens the thesis"

  - name: Meituan
    ticker: 3690.HK
    position: 44
    cost_basis: 23.55
    currency: EUR
    notes: "China platform/consumption exposure. HKD ticker."
    rotation:
      role: aggressive
      loss_protection:
        avoid_as_funding_source_below_recovery: true
        recovery_price: 160
        note: "Deep-loss protection: wait for a meaningful recovery before using Meituan as a funding source."
      sell_strength:
        min_daily_pct: 6.0
        min_5d_pct: 14.0
      buy_opportunity:
        near_low_years: 1
        near_low_tolerance_pct: 6.0
        max_5d_pct: -10.0
      fundamental_guardrail:
        red_flags:
          - "Core local commerce growth or margins deteriorate materially"
          - "Competition from Alibaba/Douyin/JD materially worsens unit economics"
          - "China consumer spending weakens beyond current expectations"
          - "Regulatory pressure returns in a way that impairs profitability"

  - name: Tencent
    ticker: 0700.HK
    position: 1
    cost_basis: 48.12
    currency: EUR
    notes: "Residual observation position after successful prior trade."
    rotation:
      role: core
      sell_strength:
        min_daily_pct: 5.0
        min_5d_pct: 10.0
      buy_opportunity:
        near_low_years: 1
        near_low_tolerance_pct: 5.0
        max_5d_pct: -8.0
      fundamental_guardrail:
        red_flags:
          - "Gaming, ads, fintech or cloud growth materially weakens"
          - "Buyback pace slows sharply without explanation"
          - "China regulatory pressure materially returns"
          - "Portfolio investment losses or margin pressure worsen"

  - name: NIO
    ticker: NIO
    position: 12
    cost_basis: 4.49
    currency: EUR
    notes: "Tiny speculative position."
    rotation:
      role: speculative
      loss_protection:
        avoid_as_funding_source_below_recovery: true
        recovery_price: 8
        note: "Tiny speculative position; avoid selling at a deep loss unless the business/funding thesis is broken."
      sell_strength:
        min_daily_pct: 10.0
        min_5d_pct: 25.0
      buy_opportunity:
        near_low_years: 1
        near_low_tolerance_pct: 8.0
        max_5d_pct: -15.0
      fundamental_guardrail:
        red_flags:
          - "Liquidity runway worsens or dilution risk rises materially"
          - "Deliveries or gross margin deteriorate materially"
          - "China EV price war worsens"
          - "New model cycle fails to improve demand"

  - name: iQIYI
    ticker: IQ
    position: 35
    cost_basis: 14.23
    currency: EUR
    notes: "High-risk small China ADR position."
    rotation:
      role: speculative
      loss_protection:
        avoid_as_funding_source_below_recovery: true
        recovery_price: 4
        note: "Deep-loss protection: avoid selling unless the long-term thesis is broken or price materially recovers."
      sell_strength:
        min_daily_pct: 10.0
        min_5d_pct: 25.0
      buy_opportunity:
        near_low_years: 1
        near_low_tolerance_pct: 8.0
        max_5d_pct: -15.0
      fundamental_guardrail:
        red_flags:
          - "Subscriber growth or ARPU deteriorates materially"
          - "Content costs rise faster than revenue"
          - "Cash flow or balance sheet pressure worsens"
          - "China ADR or regulatory risk materially worsens"

market_indicators:
  - name: Crypto Fear & Greed
    type: crypto_fear_greed
    ticker: CRYPTO_FNG
    rules:
      extreme_fear_below: 15
      fear_watch_below: 25
      extreme_greed_above: 80
    notes: "Extreme fear may fit BTC accumulation watch. Extreme greed may fit patience or trimming discipline."

  - name: BlackRock Bitcoin ETF
    ticker: IBIT
    rules:
      watch_only: true
    notes: "Institutional Bitcoin access proxy. Watch price trend together with BTC and ETF flow news."

  - name: VIX
    ticker: ^VIX
    rules:
      extreme_fear_above: 30
      extreme_greed_below: 12
    notes: "Extreme fear may fit panic-buy watch. Extreme greed may fit strength-selling discipline."

  - name: US 10Y Yield
    ticker: ^TNX
    notes: "Yahoo quotes TNX as yield x10. 45 means 4.5%. Higher yields pressure high-duration tech."

  - name: Nasdaq 100 ETF
    ticker: QQQ
    notes: "AI / mega-cap tech risk appetite proxy."
